<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Here to Start</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;800&display=swap');

        :root {
            --indigo: #667eea;
            --violet: #764ba2;
            --pink: #ff5fa2;
            --berry: #c74b8c;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        body {
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.14), transparent 28%),
                radial-gradient(circle at 85% 15%, rgba(255, 167, 214, 0.18), transparent 24%),
                radial-gradient(circle at 75% 85%, rgba(212, 226, 255, 0.18), transparent 28%),
                linear-gradient(135deg, var(--indigo), var(--violet));
            color: #fff;
        }

        .glow {
            position: fixed;
            inset: -20%;
            background: radial-gradient(circle, rgba(255,255,255,0.14) 0%, transparent 58%);
            filter: blur(20px);
            animation: drift 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes drift {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-18px) scale(1.03); }
        }

        .gate {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            z-index: 5;
            padding: 24px;
            text-align: center;
            transition: opacity 0.45s ease, visibility 0.45s ease;
        }

        .gate.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .card {
            width: min(92vw, 520px);
            padding: 40px 26px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(14px);
            box-shadow: 0 24px 60px rgba(27, 12, 48, 0.28);
        }

        .card h1 {
            font-family: 'Baloo 2', cursive;
            font-size: clamp(2.4rem, 8vw, 4.5rem);
            line-height: 0.95;
            margin: 0 0 14px;
        }

        .card p {
            font-size: 1.05rem;
            line-height: 1.7;
            margin: 0 0 24px;
            opacity: 0.96;
        }

        .start-btn {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 16px 28px;
            font: inherit;
            font-weight: 800;
            font-size: 1rem;
            color: var(--berry);
            background: #fff;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(16, 8, 32, 0.22);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(16, 8, 32, 0.28);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .note {
            margin-top: 12px;
            font-size: 0.95rem;
            opacity: 0.82;
        }

        .experience {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.45s ease;
            background: #fff;
            z-index: 1;
        }

        .experience.show {
            opacity: 1;
            pointer-events: auto;
        }

        @media (max-width: 600px) {
            .card {
                padding: 34px 20px;
            }

            .card p {
                font-size: 0.98rem;
            }
        }
    </style>
</head>
<body>
    <div class="glow"></div>

    <div class="gate" id="gate">
        <div class="card">
            <h1>Click Here to Start</h1>
            <p>Turn up the volume on your device!</p>
            <button class="start-btn" id="startBtn">Click Here to Start</button>
            <div class="note">Hope you like it!</div>
        </div>
    </div>

    <iframe class="experience" id="experienceFrame" title="Proposal and story experience"></iframe>

    <audio id="bgMusic" src="06.%20Straight%20From%20The%20Heart.mp3" preload="auto" loop playsinline></audio>

    <script>
        const gate = document.getElementById('gate');
        const startBtn = document.getElementById('startBtn');
        const frame = document.getElementById('experienceFrame');
        const bgMusic = document.getElementById('bgMusic');
        let started = false;

        function startExperience() {
            if (started) {
                return;
            }
            started = true;

            bgMusic.currentTime = 0;
            const playPromise = bgMusic.play();
            if (playPromise && typeof playPromise.catch === 'function') {
                playPromise.catch(() => {
                    started = false;
                    return;
                });
            }

            frame.src = 'proposal.html';
            frame.classList.add('show');
            gate.classList.add('hidden');
        }

        startBtn.addEventListener('click', startExperience);
        gate.addEventListener('click', (event) => {
            if (event.target === gate) {
                startExperience();
            }
        });
    </script>
</body>
</html>
