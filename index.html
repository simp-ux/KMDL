<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Girlfriend? 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito:wght@400;600;800&display=swap');

        :root {
            --pink: #ff5fa2;
            --rose: #ff8cc6;
            --berry: #c74b8c;
            --violet: #764ba2;
            --indigo: #667eea;
            --ink: #322645;
            --card: rgba(255, 255, 255, 0.88);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background:
                radial-gradient(circle at 10% 20%, rgba(255, 163, 201, 0.35) 0%, transparent 35%),
                radial-gradient(circle at 80% 12%, rgba(167, 187, 255, 0.35) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 210, 228, 0.28) 0%, transparent 45%),
                linear-gradient(130deg, var(--indigo) 0%, var(--violet) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--ink);
        }

        .orb {
            position: fixed;
            filter: blur(1px);
            border-radius: 999px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.9;
            animation: drift 7s ease-in-out infinite;
        }

        .orb-1 {
            width: 260px;
            height: 260px;
            left: -70px;
            top: -55px;
            background: radial-gradient(circle at 30% 30%, #ffd2ea, #ff74b7);
        }

        .orb-2 {
            width: 210px;
            height: 210px;
            right: -60px;
            bottom: -40px;
            background: radial-gradient(circle at 35% 35%, #dbe2ff, #8b7dff);
            animation-delay: 1.4s;
        }

        @keyframes drift {
            0%, 100% {
                transform: translateY(0px) scale(1);
            }
            50% {
                transform: translateY(-18px) scale(1.05);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            animation: float-up var(--duration) linear forwards;
            will-change: transform, opacity;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(var(--tx)) rotate(360deg);
            }
        }

        .container {
            text-align: center;
            background: var(--card);
            padding: 70px 50px;
            border-radius: 28px;
            box-shadow: 0 30px 80px rgba(24, 10, 45, 0.35);
            max-width: 550px;
            z-index: 10;
            position: relative;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .container.pre-intro {
            opacity: 0;
            transform: translateY(24px) scale(0.96);
            pointer-events: none;
            animation: none;
        }

        .container.reveal {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            animation: slideIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .intro-screen {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(37, 18, 61, 0.18), rgba(37, 18, 61, 0.08));
            transition: opacity 0.7s ease;
        }

        .intro-screen.hidden {
            opacity: 0;
        }

        .intro-message {
            max-width: 850px;
            font-family: 'Baloo 2', cursive;
            font-size: clamp(1.8rem, 6vw, 4rem);
            color: #fff7ff;
            text-shadow: 0 10px 28px rgba(35, 10, 56, 0.42);
            line-height: 1.25;
            white-space: pre-line;
            opacity: 0;
            transform: translateY(18px) scale(0.98);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .intro-message.in {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emoji-main {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
            display: block;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        h1 {
            color: #59317e;
            font-size: 2.3em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-family: 'Baloo 2', cursive;
            text-shadow: 0 7px 24px rgba(118, 75, 162, 0.25);
        }

        .subtitle {
            color: #6e5d86;
            font-size: 1em;
            margin-bottom: 45px;
            line-height: 1.6;
            font-weight: 400;
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        button {
            padding: 16px 45px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        button:active::before {
            animation: ripple 0.6s ease-out;
        }

        @keyframes ripple {
            to {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }

        .yes-btn {
            background: linear-gradient(135deg, var(--pink) 0%, var(--berry) 100%);
            color: white;
            min-width: 140px;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
            animation: pulseCta 2s ease-in-out infinite;
        }

        .yes-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.4);
        }

        .yes-btn:active {
            transform: translateY(-1px);
        }

        @keyframes pulseCta {
            0%, 100% {
                box-shadow: 0 10px 30px rgba(255, 107, 157, 0.32);
            }
            50% {
                box-shadow: 0 12px 42px rgba(255, 107, 157, 0.52);
            }
        }

        .no-btn {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            color: #764ba2;
            min-width: 140px;
            position: relative;
        }

        .no-btn:hover {
            background: linear-gradient(135deg, #e8e8e8 0%, #d8d8d8 100%);
        }

        .reason {
            color: #8a7a9e;
            font-size: 0.9em;
            font-style: italic;
            font-weight: 400;
        }

        .success-message {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, var(--pink) 0%, var(--berry) 100%);
            color: white;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: 600;
            animation: successBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 40px rgba(255, 107, 157, 0.3);
        }

        @keyframes successBounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .success-message.show {
            display: block;
        }

        .celebration-burst {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }

        .burst-heart {
            position: absolute;
            font-size: 2rem;
            animation: burst 2s ease-out forwards;
        }

        @keyframes burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.1) rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 50px 30px;
                margin: 0 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .emoji-main {
                font-size: 60px;
            }

            button {
                padding: 14px 35px;
                font-size: 0.95em;
            }

            .orb-1,
            .orb-2 {
                opacity: 0.55;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="particles" id="particles"></div>

    <div class="intro-screen" id="introScreen">
        <div class="intro-message" id="introMessage"></div>
    </div>

    <div class="container pre-intro" id="proposalCard">
        <span class="emoji-main">💕</span>
        <h1>Will You Be My Girlfriend?</h1>
        <p class="subtitle">Okay, now the real question... 🌟</p>

        <div class="button-container">
            <button class="yes-btn" onclick="sayYes()">YES! 💕</button>
            <button class="no-btn" onclick="escapeNo(event)" onmouseover="escapeNo(event)">Nope 😅</button>
        </div>

        <p class="reason">(That button runs away... for fun! 😉)</p>

        <div class="success-message" id="successMessage">
            🎉 YOU SAID YES! 🎉<br>
            <span style="font-size: 0.85em; margin-top: 10px; display: block;">You've made me the happiest! 💖✨</span>
        </div>
    </div>

    <script>
        const messages = [
            "It's funny how a few moments\ncan change everything.",
            "One moment,\nI was building up the courage to ask you to dance.",
            "The next,\nI pushed through my nerves\nand asked if I could hold your hand.",
            "Then came the night\nwe shared our first kiss.",
            "After that,\nsomething changed.",
            "You became the first person\nI wanted to tell things to",
            "the first person\nI wanted to see",
            "I couldn't stop thinking about you",
            "Since then,",
            "every conversation,",
            "every laugh,",
            "and every moment we've shared",
            "it has only given me more reasons\nto like you.",
            "So now...\nthere's just one more thing\nI'd like to ask you."
        ];

        const emojis = ['❤️', '💕', '💖', '💝', '✨', '🌟', '🌠', '💫', '💞'];

        let currentMessageIndex = 0;
        let particleInterval;

        // Start particle animation on load
        window.addEventListener('load', () => {
            startParticleEffect();
            startIntroSequence();
        });

        function startParticleEffect() {
            particleInterval = setInterval(createParticle, 260);
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            particle.textContent = emoji;
            
            const startX = Math.random() * window.innerWidth;
            const duration = 3 + Math.random() * 3;
            const tx = (Math.random() - 0.5) * 200;
            
            particle.style.left = startX + 'px';
            particle.style.top = window.innerHeight + 'px';
            particle.style.setProperty('--duration', duration + 's');
            particle.style.setProperty('--tx', tx + 'px');
            
            document.getElementById('particles').appendChild(particle);
            
            setTimeout(() => particle.remove(), duration * 1000);
        }

        function startIntroSequence() {
            const introScreen = document.getElementById('introScreen');
            const introMessage = document.getElementById('introMessage');

            showIntroMessage(messages[currentMessageIndex], introMessage);

            const interval = setInterval(() => {
                currentMessageIndex++;

                if (currentMessageIndex >= messages.length) {
                    clearInterval(interval);

                    setTimeout(() => {
                        introScreen.classList.add('hidden');
                        revealProposalCard();
                    }, 900);
                    return;
                }

                showIntroMessage(messages[currentMessageIndex], introMessage);
            }, 2300);
        }

        function showIntroMessage(text, introMessage) {
            introMessage.classList.remove('in');

            setTimeout(() => {
                introMessage.textContent = text;
                introMessage.classList.add('in');
            }, 280);
        }

        function revealProposalCard() {
            const proposalCard = document.getElementById('proposalCard');
            const introScreen = document.getElementById('introScreen');

            proposalCard.classList.remove('pre-intro');
            proposalCard.classList.add('reveal');

            setTimeout(() => {
                introScreen.style.display = 'none';
            }, 700);
        }

        function sayYes() {
            clearInterval(particleInterval);
            
            const successMessage = document.getElementById('successMessage');
            successMessage.classList.add('show');
            
            // Massive celebration burst
            for (let i = 0; i < 80; i++) {
                setTimeout(() => createCelebrationBurst(), i * 30);
            }

            for (let i = 0; i < 180; i++) {
                setTimeout(() => createParticle(), i * 14);
            }
            
            // Disable buttons
            document.querySelectorAll('button').forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.6';
            });

            setTimeout(() => {
                window.location.href = 'story.html';
            }, 2600);
        }

        function createCelebrationBurst() {
            const burst = document.createElement('div');
            burst.classList.add('celebration-burst');
            
            const heart = document.createElement('div');
            heart.classList.add('burst-heart');
            heart.textContent = ['❤️', '💕', '💖', '✨', '🌟'][Math.floor(Math.random() * 5)];
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 200 + Math.random() * 300;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity;
            
            heart.style.left = '50%';
            heart.style.top = '50%';
            heart.style.setProperty('--tx', tx + 'px');
            heart.style.setProperty('--ty', ty + 'px');
            
            burst.appendChild(heart);
            document.body.appendChild(burst);
            
            setTimeout(() => burst.remove(), 2000);
        }

        function escapeNo(event) {
            const button = event.target;
            const randomX = (Math.random() - 0.5) * 240;
            const randomY = (Math.random() - 0.5) * 220;
            const rotation = Math.random() * 360;
            
            button.style.transform = `translate(${randomX}px, ${randomY}px) rotate(${rotation}deg)`;
        }

        // Subtle continuous particle effect
        window.addEventListener('resize', () => {
            // Responsive adjustments can go here
        });
    </script>
</body>
</html>
